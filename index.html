var REVVIEW={};var USER='',ADMINUNLOCK={};

function apagarRevisoes(){if(!isAdmin())return;var mx=maxRev();if(mx<1){alert('Não há revisões — já está na REV 0.');return;}if(!confirm('Apagar as '+mx+' revisão(ões) deste turno/data e voltar para a REV 0? (mantém a REV 0)'))return;var base=chaveBase();for(var i=1;i<=mx;i++){var k=base+'|r'+i;if(DB.sel)delete DB.sel[k];if(window.__pushDoc)window.__pushDoc('sel__'+k.split('|').join('__'),{});}DB.revn=DB.revn||{};DB.revn[base]=0;delete REVVIEW[base];save();render();}
function maxRev(){DB.revn=DB.revn||{};return DB.revn[chaveBase()]||0;}
function revN(){var b=chaveBase();var mx=maxRev();var v=REVVIEW[b];if(v==null||v>mx)v=mx;return v;}

function chave(){var r=revN();return DATA+'|'+TURNO+(r>0?'|r'+r:'');}

function bloqueada(){if(isAdmin())return false;var mx=maxRev();var vr=revN();
  if(vr<mx)return true; /* vendo revisão anterior = só leitura */
  if(vr>0)return false; /* última revisão é editável */
  if(DATA<hojeISO())return true;
  if(DATA===hojeISO()){var lk=(HORAS[TURNO]||HORAS.dia).lock;var d=new Date();var nh=d.getHours()+d.getMinutes()/60;
    if(nh>=lk){var s=selT();return Object.keys(s).some(function(t){return Object.keys(s[t]).length;});}}

  DB.sel=DB.sel||{};DB.sel[nextKey]=JSON.parse(JSON.stringify(DB.sel[curKey]||{}));DB.revn=DB.revn||{};DB.revn[base]=next;REVVIEW[base]=next;save();render();}

    return '<div class="panel"><h3>👷 '+nm+' <span style="font-size:12.5px;color:var(--muted);font-weight:400">· '+d.nat+' atividades · '+totDem+' HH de demanda · '+(falta?'<span style="color:var(--rd);font-weight:700">⚠ EFETIVO INSUFICIENTE</span>':'<span style="color:var(--ok);font-weight:700">✓ EFETIVO SUPORTA</span>')+'</span></h3>'+
      '<table class="tbl"><thead><tr><th>Disciplina</th><th>Efetivo disponível</th><th>Demanda</th><th>Capacidade</th><th>Situação</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" class="empty">Sem recursos nas atividades selecionadas.</td></tr>')+'</tbody></table></div>';
  }).join('');
  return cfg+cards;
}
function renderResumo(){
  var s=selT();var PCTN={n:0,a:50,c:100};
  var encs=DADOS.enc.filter(function(g){return g.tags.some(function(t){return s[t]&&Object.keys(s[t]).length;});});
  var fb='<div class="flt">'+[['todos','Todas'],['n','⚪ Não iniciadas'],['a','🟡 Em andamento'],['c','🟢 Concluídas']].map(function(o){return '<button class="'+(RESF===o[0]?'on':'')+'" onclick="setResF(\''+o[0]+'\')">'+o[1]+'</button>';}).join('')+'</div>';
  var bar='<div class="noprint" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+fb+'<button class="btn" onclick="window.print()">🖨 Imprimir resumo</button></div>';
  if(!encs.length)return '<div class="panel">'+bar+'<div class="empty">Nada programado para '+(TURNO==='dia'?'o Dia':'a Noite')+' de '+fmtBR(DATA)+'.</div></div>';
  var T=0,D=0,A=0,N=0;
  var blocks=encs.map(function(g){var nm=encNome(g);var et=0,ed=0,ea=0,en0=0,sump=0;var items='';
    g.tags.forEach(function(t){var sel=s[t];if(!sel)return;
      atDe(t).forEach(function(a){if(a.f!==undefined)return;var e=sel[a.i];if(!e)return;et++;var st=e.st;var p=(e.pct!=null?(parseFloat((''+e.pct).replace(',','.'))||0):PCTN[st]);sump+=p;
        if(st==='c')ed++;else if(st==='a')ea++;else en0++;
        if(RESF==='todos'||st===RESF)items+='<tr><td>'+t+'</td><td>'+a.a+'</td><td class="cc">'+p+'%</td><td><span class="pill p-'+st+'">'+STLBL[st]+'</span></td></tr>';});
    });
    T+=et;D+=ed;A+=ea;N+=en0;
    if(RESF!=='todos'&&!items)return '';
    var pc=et?Math.round(ed/et*100):0;var avg=et?Math.round(sump/et):0;
    return '<div class="panel"><h3>👷 '+nm+'</h3>'+
      '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;margin-bottom:8px">'+
      '<span><b>'+et+'</b> programadas</span>'+
      '<span style="color:var(--rd)">⚪ <b>'+en0+'</b> não iniciadas</span>'+
      '<span style="color:var(--am)">🟡 <b>'+ea+'</b> em andamento</span>'+
      '<span style="color:var(--ok)">🟢 <b>'+ed+'</b> concluídas</span>'+
      '<span>Avanço médio: <b>'+avg+'%</b></span></div>'+
      '<div class="prog"><div class="progf" style="width:'+pc+'%"></div></div>'+
      '<table class="tbl" style="margin-top:10px"><thead><tr><th>TAG</th><th>Atividade</th><th>%</th><th>Status</th></tr></thead><tbody>'+items+'</tbody></table></div>';
  }).join('');
  if(RESF!=='todos'&&!blocks.replace(/\s/g,''))blocks='<div class="panel"><div class="empty">Nenhuma atividade com status "'+STLBL[RESF]+'" neste turno.</div></div>';
  var gpc=T?Math.round(D/T*100):0;
  var head='<div class="panel" id="rhead"><div class="prhead"><img class="prlogo" src="'+(typeof LOGO!=='undefined'?LOGO:'')+'"><div><div class="prtitle">RESUMO DO TURNO '+(TURNO==='dia'?'DIURNO ☀':'NOTURNO 🌙')+'</div><div class="prsub">UGAV · PERMUTADORES · '+turnoLabel()+' · '+fmtBR(DATA)+histTag()+'</div></div></div>'+
    '<div class="kpis" style="margin-top:12px">'+kpi('bl',T,'Programadas')+kpi('rd',N,'Não iniciadas')+kpi('am',A,'Em andamento')+kpi('ok',D,'Concluídas')+kpi('ok',gpc+'%','% Executado')+'</div></div>';
  return bar+head+blocks;
}
