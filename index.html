.areatag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:12px;color:#fff}
.ab-acida{background:var(--acida)}.ab-naoacida{background:var(--naoacida)}.ab-aircooler{background:var(--aircooler)}
.modal{position:fixed;inset:0;background:rgba(10,16,40,.55);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow:auto}

.sheet{background:var(--card);border-radius:16px;width:100%;max-width:860px;overflow:hidden}
.mhead{background:var(--navy);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:12px}

.act{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line)}

.act .desc{flex:1;font-size:13.5px}
.act .rec{font-size:11px;color:var(--muted);margin-top:2px}
.wfase{display:flex;align-items:center;gap:8px;background:#eef2fb;border-left:4px solid var(--orange);padding:7px 10px;border-radius:7px;margin:14px 0 4px}
.wft{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--navy);flex:1}
.wact{display:flex;align-items:center;gap:10px;padding:7px 6px;border-bottom:1px solid var(--line)}
.wn{font-weight:700;color:var(--navy);min-width:36px;font-size:12.5px}
.wd{flex:1;font-size:13.5px}
.wbtns{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}

.act .st{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}

.lg{height:38px;width:auto;background:#fff;border-radius:7px;padding:3px 7px}

.prtbl td,.prtbl th{padding:4px 6px}
.prtbl th{text-align:center;vertical-align:middle}
.prtbl .cc{text-align:center}
.faserow td{background:#eef2fb;color:var(--navy);font-weight:700;font-size:11px}
.tagrow td{background:#dde6f7}
.totrow{font-weight:700;background:#f1f4fb}

</style>
</head>

var _applyingRemote=false;

window.__applyRemote=function(id,d){_applyingRemote=true;try{

var TURNO='dia', DATA=hojeISO(), VIEW='montar', FAREA='todas', CUR=null;
var HORAS={dia:{ini:'07:30',fim:'17:30',h:10,lock:10},noite:{ini:'19:30',fim:'04:30',h:9,lock:20}};
function horasTurno(){var c=DB.cfg||{};var k='horas_'+TURNO;return c[k]!=null?c[k]:(HORAS[TURNO]||HORAS.dia).h;}
function turnoLabel(){var h=HORAS[TURNO]||HORAS.dia;return (TURNO==='dia'?'Dia ☀':'Noite 🌙')+' · '+h.ini+'–'+h.fim;}
function histTag(){return DATA<hojeISO()?' <span class="histb">📚 HISTÓRICO</span>':'';}
function hojeISO(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function fmtBR(s){if(!s)return'';var a=s.split('-');return a[2]+'/'+a[1]+'/'+a[0];}
function chaveBase(){return DATA+'|'+TURNO;}
var REVVIEW={};var USER='',ADMINUNLOCK={};
function isAdmin(){return USER==='c3plan';}
function descongelar(){if(!isAdmin())return;ADMINUNLOCK[chave()]=true;render();}
function apagarRevisoes(){if(!isAdmin())return;var mx=maxRev();if(mx<1){alert('Não há revisões — já está na REV 0.');return;}if(!confirm('Apagar as '+mx+' revisão(ões) deste turno/data e voltar para a REV 0? (mantém a REV 0)'))return;var base=chaveBase();for(var i=1;i<=mx;i++){var k=base+'|r'+i;if(DB.sel)delete DB.sel[k];if(window.__pushDoc)window.__pushDoc('sel__'+k.split('|').join('__'),{});}DB.revn=DB.revn||{};DB.revn[base]=0;delete REVVIEW[base];save();render();}
function maxRev(){DB.revn=DB.revn||{};return DB.revn[chaveBase()]||0;}
function revN(){var b=chaveBase();var mx=maxRev();var v=REVVIEW[b];if(v==null||v>mx)v=mx;return v;}
function setRev(r){REVVIEW[chaveBase()]=r;render();}
function chave(){var r=revN();return DATA+'|'+TURNO+(r>0?'|r'+r:'');}
function selT(){DB.sel[chave()]=DB.sel[chave()]||{};return DB.sel[chave()];}
function bloqueada(){if(isAdmin())return false;var mx=maxRev();var vr=revN();
  if(vr<mx)return true; /* vendo revisão anterior = só leitura */
  if(vr>0)return false; /* última revisão é editável */
  if(DATA<hojeISO())return true;
  if(DATA===hojeISO()){var lk=(HORAS[TURNO]||HORAS.dia).lock;var d=new Date();var nh=d.getHours()+d.getMinutes()/60;
    if(nh>=lk){var s=selT();return Object.keys(s).some(function(t){return Object.keys(s[t]).length;});}}
  return false;}
function criarRevisao(){var base=chaveBase();var mx=maxRev();var next=mx+1;var curKey=base+(mx>0?'|r'+mx:'');var nextKey=base+'|r'+next;
  DB.sel=DB.sel||{};DB.sel[nextKey]=JSON.parse(JSON.stringify(DB.sel[curKey]||{}));DB.revn=DB.revn||{};DB.revn[base]=next;REVVIEW[base]=next;save();render();}
function revPicker(){var mx=maxRev();if(mx<1)return '';var cur=revN();var s='<span style="font-size:12px;color:var(--muted);margin-left:6px">Ver revisão:</span>';for(var i=0;i<=mx;i++){s+='<button class="revpick'+(i===cur?' on':'')+'" onclick="setRev('+i+')">REV '+i+'</button>';}return s;}
function revBanner(){var mx=maxRev();var cur=revN();var btn='<button class="btn ghost" onclick="criarRevisao()">+ Criar Revisão (REV'+(mx+1)+')</button>';
  var adm=isAdmin()?((bloqueada()?'<button class="btn admbtn" onclick="descongelar()">🔓 Descongelar</button>':'')+(mx>0?'<button class="btn ghost" onclick="apagarRevisoes()">🗑 Apagar revisões</button>':'')):'';
  if(bloqueada()){var msg;if(cur<mx)msg='Revisão anterior (histórico). Volte para a REV '+mx+' para editar.';else if(DATA<hojeISO())msg='Data passada. Crie uma revisão para alterar.';else msg='Congelada após '+(HORAS[TURNO]||HORAS.dia).lock+'h do turno. Crie uma revisão para alterar.';
    return '<div class="lockbar noprint">🔒 <b>Somente leitura</b> — '+msg+' <span class="revlbl">REV '+cur+'</span>'+revPicker()+btn+adm+'</div>';}
  return '<div class="revbar noprint"><span class="revlbl">REV '+cur+'</span><span style="color:var(--muted);font-size:12px">editável</span>'+revPicker()+btn+adm+'</div>';}
function encNome(g){return TURNO==='dia'?g.dia:(g.noite||g.dia);}
function recDisc(rec){ /* "02 CALDEIREIRO" -> {ca:2} (heurística) */

  if(/SOLDAD/.test(rec))return{sol:q};if(/CALDEIR/.test(rec))return{ca:q};if(/AJUD|SERV/.test(rec))return{asg:q};
  if(/MEC|MONTAD/.test(rec))return{ma:q};if(/ELETR/.test(rec))return{ele:q};if(/INSP/.test(rec))return{insp:q};
  if(/PINT/.test(rec))return{pint:q};if(/MUNCK|GUIND/.test(rec))return{munck:q};return{ca:q};}

  var pn=0,an=0;

var _idc=0;function newId(){_idc++;return 'w'+Date.now().toString(36)+_idc;}

function wbsIdx(t,id){var a=DB.wbs[t]||[];for(var i=0;i<a.length;i++)if(a[i].id===id)return i;return -1;}
function bancoAddBelow(t,id){var a=ensureWbs(t);var d=prompt('Descrição da nova atividade:');if(!d||!d.trim())return;var r=prompt('Recurso (ex.: 02 CALDEIREIRO):','')||'';var i=wbsIdx(t,id);a.splice(i+1,0,{id:newId(),a:d.trim(),r:r.trim()});save();render();}
function bancoAddInPhase(t,pid){var a=ensureWbs(t);var d=prompt('Descrição da nova atividade nesta fase:');if(!d||!d.trim())return;var r=prompt('Recurso:','')||'';var i=wbsIdx(t,pid);var j=i+1;while(j<a.length&&a[j].f===undefined)j++;a.splice(j,0,{id:newId(),a:d.trim(),r:r.trim()});save();render();}
function bancoMove(t,id,dir){var a=ensureWbs(t);var i=wbsIdx(t,id);var j=i+dir;if(i<0||j<0||j>=a.length)return;var tmp=a[i];a[i]=a[j];a[j]=tmp;save();render();}
function bancoEdit(t,id){var a=ensureWbs(t);var it=a[wbsIdx(t,id)];if(!it)return;if(it.f!==undefined){var nf=prompt('Nome da fase (WBS):',it.f);if(nf&&nf.trim())it.f=nf.trim();}else{var d=prompt('Descrição:',it.a);if(d!=null&&d.trim())it.a=d.trim();var r=prompt('Recurso:',it.r||'');if(r!=null)it.r=r.trim();}save();render();}
function bancoDel(t,id){var a=ensureWbs(t);var i=wbsIdx(t,id);if(i<0)return;if(!confirm('Remover "'+(a[i].f!==undefined?a[i].f:a[i].a)+'"?'))return;a.splice(i,1);save();render();}
function bancoAddPhase(t){var a=ensureWbs(t);var nf=prompt('Nome da nova fase (WBS):');if(!nf||!nf.trim())return;a.push({id:newId(),f:nf.trim()});save();render();}
function bancoReset(t){if(!confirm('Restaurar '+t+' para o banco original? (perde as edições deste equipamento)'))return;if(DB.wbs)delete DB.wbs[t];if(DB.baseExtra)delete DB.baseExtra[t];save();render();}
function subStatus(t,item){var s=selT();return (s[t]&&s[t][item])?s[t][item].st:null;}
function toggleInc(t,item,checked){if(bloqueada())return;var s=selT();s[t]=s[t]||{};if(checked){if(!s[t][item])s[t][item]={st:'n'};}else{delete s[t][item];if(!Object.keys(s[t]).length)delete s[t];}save();}
function setSt(t,item,st){if(bloqueada())return;var s=selT();s[t]=s[t]||{};s[t][item]=s[t][item]||{st:'n'};s[t][item].st=st;save();abrir(t);}
function actInfo(t,item){var sc=selT()[t]||{};var e=sc[item];if(e&&e.custom)return {a:e.a,r:e.r||''};var f=atDe(t).find(function(x){return x.i===item;});return f?{a:f.a,r:f.r||''}:{a:item,r:''};}
function addCustom(t){if(bloqueada()){alert('Programação congelada. Crie uma revisão para alterar.');return;}if(!CUR)CUR=t;var a=prompt('Descrição da atividade (não listada):');if(!a||!a.trim())return;var r=prompt('Recurso (ex.: 02 CALDEIREIRO):','')||'';var s=selT();s[t]=s[t]||{};var n=1;while(s[t]['c'+n])n++;s[t]['c'+n]={st:'n',custom:1,a:a.trim(),r:r.trim()};save();abrir(t);}
function remCustom(t,id){if(bloqueada())return;var s=selT();if(s[t])delete s[t][id];if(s[t]&&!Object.keys(s[t]).length)delete s[t];save();abrir(t);}

/* ===== render ===== */
function go(v){VIEW=v;render();}
function setTurno(t){TURNO=t;render();}
function setData(v){DATA=v;render();}
function render(){
  var tl=document.getElementById('toplogo');if(tl&&typeof LOGO!=='undefined')tl.src=LOGO;
  var ht=document.getElementById('histtop');if(ht)ht.style.display=(DATA<hojeISO())?'inline-block':'none';
  document.getElementById('turnos').innerHTML=
    '<button class="'+(TURNO==='dia'?'on':'')+'" onclick="setTurno(\'dia\')">☀ Dia</button>'+
    '<button class="'+(TURNO==='noite'?'on':'')+'" onclick="setTurno(\'noite\')">🌙 Noite</button>';
  document.getElementById('data').value=DATA;
  var tabs=[['montar','Montar Programação'],['prog','Programação do Turno'],['resumo','Resumo do Turno'],['calib','Calibração de Efetivo'],['banco','Banco de Atividades'],['equip','Equipamentos']];
  document.getElementById('tabs').innerHTML=tabs.map(function(x){return '<button class="tab '+(VIEW===x[0]?'on':'')+'" onclick="go(\''+x[0]+'\')">'+x[1]+'</button>';}).join('');
  document.getElementById('view').innerHTML=VIEW==='montar'?renderMontar():VIEW==='prog'?renderProg():VIEW==='resumo'?renderResumo():VIEW==='calib'?renderCalib():VIEW==='banco'?renderBanco():renderEquip();
}
function kpisMontar(){
  var s=selT();var nAtiv=0,nTags={};Object.keys(s).forEach(function(t){nTags[t]=1;nAtiv+=Object.keys(s[t]).length;});
  var done=0;Object.keys(s).forEach(function(t){Object.keys(s[t]).forEach(function(i){if(s[t][i].st==='c')done++;});});
  return '<div class="kpis">'+
   kpi('or',Object.keys(nTags).length,'Equip. no turno')+
   kpi('bl',nAtiv,'Atividades programadas')+
   kpi('ok',done,'Concluídas')+
   kpi('am',nAtiv-done,'Pendentes')+'</div>';
}
function kpi(c,v,l){return '<div class="kpi '+c+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
function renderMontar(){
  var flt='<div class="flt">'+[['todas','Todas as áreas'],['acida','Ácida'],['naoacida','Não ácida'],['aircooler','Air cooler']].map(function(a){return '<button class="'+(FAREA===a[0]?'on':'')+'" onclick="FAREA=\''+a[0]+'\';render()">'+a[1]+'</button>';}).join('')+'</div>';
  var s=selT();
  var cards=DADOS.enc.map(function(g,gi){
    var nm=encNome(g);if(!nm)return'';
    var tags=g.tags.filter(function(t){return FAREA==='todas'||area(t)===FAREA;});
    if(!tags.length)return'';
    var nProg=tags.reduce(function(a,t){return a+((s[t]&&Object.keys(s[t]).length)||0);},0);
    var chips=tags.map(function(t){var e=DADOS.equip[t]||{};var ar=area(t);var ks=s[t]?Object.keys(s[t]):[];var seln=ks.length;var done=ks.filter(function(k){return s[t][k].st==='c';}).length;var pend=seln-done;
      return '<div class="tagchip '+(seln?'sel':'')+'" onclick="abrir(\''+t+'\')"><span class="dot ab-'+ar+'" style="background:var(--'+ar+')"></span>'+t+(ar?' <span class="areatag ab-'+ar+'">'+AREALBL(ar)+'</span>':'')+(pend?' <span class="n" title="Atividades programadas a concluir">'+pend+'</span>':'')+(done?' <span class="nc" title="Atividades concluídas">'+done+' ✓</span>':'')+'</div>';}).join('');
    return '<div class="enc"><div class="ench"><span class="nm">'+nm+'</span><span class="cap">'+tags.length+' equipamentos</span><span class="badge">'+nProg+' atividades</span></div><div class="tags">'+chips+'</div></div>';
  }).join('')||'<div class="empty">Nenhum encarregado/equipamento para este turno/área.</div>';
  return revBanner()+kpisMontar()+flt+'<div class="panel"><h3>Encarregados e equipamentos — '+turnoLabel()+' · '+fmtBR(DATA)+histTag()+'</h3><div class="vsub" style="font-size:12px;color:var(--muted);margin-bottom:10px">Clique num equipamento para marcar as atividades que entram neste turno.</div>'+cards+'</div>';
}
function abrir(t){CUR=t;var e=DADOS.equip[t]||{};var ar=area(t);
  document.getElementById('mT').textContent=t+(ar?'  ·  '+AREALBL(ar):'');
  document.getElementById('mS').textContent=(e.desc||'')+' · '+(e.tipo||'')+' · Enc.: '+encNome(DADOS.enc.find(function(g){return g.tags.indexOf(t)>=0;})||{dia:'—'});
  var acts=atDe(t);var s=selT();var BL=bloqueada();var DIS=BL?' disabled':'';var html=BL?'<div class="lockbar" style="margin:0 0 10px">🔒 Congelada (REV '+revN()+') — crie uma revisão para alterar.</div>':'';
  acts.forEach(function(a){
    if(a.f){html+='<div class="fase">'+a.n+'. '+a.f+'</div>';return;}
    var inc=s[t]&&s[t][a.i];var st=inc?s[t][a.i].st:null;
    html+='<div class="act"><input type="checkbox" class="ck"'+DIS+' '+(inc?'checked':'')+' onchange="toggleInc(\''+t+'\',\''+a.i+'\',this.checked);abrir(\''+t+'\')">'+
      '<div class="desc">'+a.n+' '+a.a+(a.r?'<div class="rec">👷 '+a.r+'</div>':'')+
      (inc?'<div class="st"><button class="n '+(st==='n'?'on':'')+'"'+DIS+' onclick="setSt(\''+t+'\',\''+a.i+'\',\'n\')">Não iniciada</button><button class="a '+(st==='a'?'on':'')+'"'+DIS+' onclick="setSt(\''+t+'\',\''+a.i+'\',\'a\')">Em andamento</button><button class="c '+(st==='c'?'on':'')+'"'+DIS+' onclick="setSt(\''+t+'\',\''+a.i+'\',\'c\')">Concluída</button></div>':'')+
      '</div></div>';
  });
  var sc=selT()[t]||{};var custom=Object.keys(sc).filter(function(k){return sc[k].custom;});
  if(custom.length){html+='<div class="fase" style="border-left-color:var(--acc)">+ ATIVIDADES INSERIDAS</div>';custom.forEach(function(k){var st=sc[k].st;html+='<div class="act"><input type="checkbox" class="ck" checked onchange="remCustom(\''+t+'\',\''+k+'\')"><div class="desc">'+sc[k].a+(sc[k].r?'<div class="rec">👷 '+sc[k].r+'</div>':'')+'<div class="st"><button class="n '+(st==='n'?'on':'')+'" onclick="setSt(\''+t+'\',\''+k+'\',\'n\')">Não iniciada</button><button class="a '+(st==='a'?'on':'')+'" onclick="setSt(\''+t+'\',\''+k+'\',\'a\')">Em andamento</button><button class="c '+(st==='c'?'on':'')+'" onclick="setSt(\''+t+'\',\''+k+'\',\'c\')">Concluída</button> <button onclick="remCustom(\''+t+'\',\''+k+'\')" style="border:0;background:none;color:var(--rd);cursor:pointer;font-weight:700">✕ remover</button></div></div></div>';});}
  if(!acts.length&&!custom.length)html='<div class="empty">Sem atividades cadastradas para este equipamento.</div>';
  html+='<div style="margin:16px 0 4px"><button class="btn ghost" onclick="addCustom(\''+t+'\')">+ Inserir atividade não listada</button></div>';
  document.getElementById('mBody').innerHTML=html;
  document.getElementById('modal').classList.add('on');
}
function fechar(){document.getElementById('modal').classList.remove('on');render();}
var STLBL={n:'Não iniciada',a:'Em andamento',c:'Concluída'};
function renderProg(){
  var s=selT();var meta=DB.meta||(DB.meta={});DB.sup=DB.sup||{};
  var mi=function(k,ph){return '<input value="'+((meta[k]||'')+'').replace(/"/g,'&quot;')+'" oninput="DB.meta[\''+k+'\']=this.value;save()" placeholder="'+ph+'" class="metai">';};
  var si=function(nm){return '<input value="'+((DB.sup[nm]||'')+'').replace(/"/g,'&quot;')+'" oninput="DB.sup[\''+nm.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\']=this.value;save()" placeholder="Supervisor" class="metai">';};
  var PD=[['asg','ASG'],['ca','CA'],['ele','ELE'],['ma','MA'],['insp','INSP'],['pint','PINT'],['sol','SOL'],['munck','MK']];
  var NC=9;var PCT={n:'0',a:'50',c:'100'};
  var bar=revBanner()+'<div class="noprint" style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px"><span style="align-self:center;font-size:12px;color:var(--muted)">'+(bloqueada()?'🔒 Somente leitura':'✏️ Campos editáveis — clique para ajustar')+'</span><button class="btn" onclick="window.print()">🖨 Imprimir — 1 página por encarregado</button></div>';
  var encs=DADOS.enc.filter(function(g){return g.tags.some(function(t){return s[t]&&Object.keys(s[t]).length;});});
  if(!encs.length)return '<div class="panel">'+bar+'<div class="empty">Nenhuma atividade programada para '+(TURNO==='dia'?'o Dia':'a Noite')+' de '+fmtBR(DATA)+'. Vá em "Montar Programação".</div></div>';
  var th='<tr><th>Item</th><th>TAG</th><th>Descrição do serviço</th><th>Prior.</th><th>Recurso específico</th><th>%</th><th>Status</th><th>PT</th><th>Observações</th></tr>';
  var pages=encs.map(function(g,gi){
    var nm=encNome(g);var gtags=g.tags.filter(function(t){return s[t]&&Object.keys(s[t]).length;});
    var rows='';var item=0;var DIS=bloqueada()?' disabled':'';
    function arow(t,key,inf,st){item++;var en=s[t][key]||{};
      var pct=(en.pct!=null?en.pct:PCT[st]);
      var ssel='<select class="ci cisel st-'+st+'"'+DIS+' onchange="setProgF(\''+t+'\',\''+key+'\',\'st\',this.value);render()"><option value="n"'+(st==='n'?' selected':'')+'>Não iniciada</option><option value="a"'+(st==='a'?' selected':'')+'>Em andamento</option><option value="c"'+(st==='c'?' selected':'')+'>Concluída</option></select>';
      return '<tr><td class="cc">'+item+'</td><td>'+t+'</td><td>'+inf.a+'</td><td class="cc"><input class="ci ciw"'+DIS+' value="'+(en.prior||'')+'" oninput="setProgF(\''+t+'\',\''+key+'\',\'prior\',this.value)"></td><td>'+(inf.r||'')+'</td><td class="cc"><input class="ci ciw"'+DIS+' type="number" min="0" max="100" value="'+pct+'" onchange="setProgPct(\''+t+'\',\''+key+'\',this.value)" title="Digite o avanço (%) — o status muda sozinho"></td><td>'+ssel+'</td><td class="cc"><input class="ci ciw"'+DIS+' value="'+(en.pt!=null?(''+en.pt).replace(/"/g,'&quot;'):'PT')+'" oninput="setProgF(\''+t+'\',\''+key+'\',\'pt\',this.value)"></td><td><input class="ci"'+DIS+' value="'+((en.obs||'')+'').replace(/"/g,'&quot;')+'" oninput="setProgF(\''+t+'\',\''+key+'\',\'obs\',this.value)"></td></tr>';}
    gtags.forEach(function(t){var e=DADOS.equip[t]||{};var sel=s[t];
      rows+='<tr class="tagrow"><td colspan="'+NC+'">'+t+' — '+(e.desc||'')+'  ['+AREALBL(area(t))+']</td></tr>';
      var fase='',shown={};
      atDe(t).forEach(function(a){if(a.f){fase=a.n+'. '+a.f;return;}if(!sel[a.i])return;if(!shown[fase]){rows+='<tr class="faserow"><td colspan="'+NC+'">'+fase+'</td></tr>';shown[fase]=1;}rows+=arow(t,a.i,{a:a.a,r:a.r},sel[a.i].st);});
      var cust=Object.keys(sel).filter(function(k){return sel[k].custom;});
      if(cust.length){rows+='<tr class="faserow"><td colspan="'+NC+'">+ ATIVIDADES INSERIDAS</td></tr>';cust.forEach(function(k){rows+=arow(t,k,{a:sel[k].a,r:sel[k].r},sel[k].st);});}
    });
    var totrow='';
    var header='<div class="prhead"><img class="prlogo" src="'+(typeof LOGO!=='undefined'?LOGO:'')+'"><div><div class="prtitle">PROGRAMAÇÃO '+(TURNO==='dia'?'DIURNA':'NOTURNA')+' — PARADA UGAV</div><div class="prsub">UGAV · PERMUTADORES · <b>REV '+revN()+'</b></div></div></div>'+
      '<div class="prgrid"><span><b>Encarregado:</b> '+nm+'</span><span><b>Supervisor:</b> '+si(nm)+'</span><span><b>Coordenador do turno:</b> '+mi('coord','Nome')+'</span><span><b>Data:</b> '+fmtBR(DATA)+' · '+turnoLabel()+histTag()+'</span><span><b>Fiscal:</b> '+mi('fiscal','MA/PM')+'</span><span><b>Planejador:</b> '+mi('planejador','Nome')+'</span><span><b>Emissão:</b> '+mi('emissao','dd/mm/aaaa')+'</span></div>';
    return '<div class="page'+(gi>0?' pgbreak':'')+'">'+header+'<div style="overflow:auto"><table class="tbl prtbl"><thead>'+th+'</thead><tbody>'+rows+totrow+'</tbody></table></div></div>';
  }).join('');
  return '<div class="panel">'+bar+pages+'</div>';
}
function renderEquip(){
  var flt='<div class="flt">'+[['todas','Todas'],['acida','Ácida'],['naoacida','Não ácida'],['aircooler','Air cooler']].map(function(a){return '<button class="'+(FAREA===a[0]?'on':'')+'" onclick="FAREA=\''+a[0]+'\';render()">'+a[1]+'</button>';}).join('')+'</div>';
  var rows=DADOS.ordem.filter(function(t){return FAREA==='todas'||area(t)===FAREA;}).map(function(t){var e=DADOS.equip[t]||{};var n=atDe(t).filter(function(a){return a.a;}).length;
    return '<tr class="clic" onclick="abrir(\''+t+'\')" style="cursor:pointer"><td><b>'+t+'</b></td><td>'+(e.desc||'')+'</td><td>'+(e.tipo||'')+'</td><td><span class="areatag ab-'+area(t)+'">'+AREALBL(area(t))+'</span></td><td>'+n+'</td><td>'+(e.encDia||'')+'</td><td>'+(e.encNoite||'')+'</td></tr>';}).join('');
  return flt+'<div class="panel"><h3>Equipamentos ('+DADOS.ordem.length+')</h3><table class="tbl"><thead><tr><th>TAG</th><th>Descrição</th><th>Tipo</th><th>Área</th><th>Atividades</th><th>Enc. Dia</th><th>Enc. Noite</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
var EFD=[['ca','Caldeireiro'],['sol','Soldador'],['asg','Ajudante'],['ma','Mecânico'],['ele','Eletricista'],['insp','Inspetor'],['pint','Pintor'],['munck','Munck/Guind.']];
function cfgGet(){DB.cfg=DB.cfg||{};if(DB.cfg.horas==null)DB.cfg.horas=10;if(DB.cfg.dur==null)DB.cfg.dur=2;return DB.cfg;}
function setCfg(k,v){cfgGet()[k]=parseFloat((''+v).replace(',','.'))||0;save();render();}
function setEfet(enc,disc,v){DB.efetivo=DB.efetivo||{};DB.efetivo[enc]=DB.efetivo[enc]||{};DB.efetivo[enc][disc]=parseInt(v)||0;save();render();}
function demandaEnc(g){var dem={},nat=0,dur=cfgGet().dur;var s=selT();
  g.tags.forEach(function(t){var sel=s[t];if(!sel)return;Object.keys(sel).forEach(function(k){nat++;var inf=actInfo(t,k);var rd=recDisc(inf.r);Object.keys(rd).forEach(function(dk){dem[dk]=(dem[dk]||0)+rd[dk]*dur;});});});
  return {dem:dem,nat:nat};}
function renderCalib(){
  var c=cfgGet();var horas=horasTurno(),dur=c.dur;var hk='horas_'+TURNO;DB.efetivo=DB.efetivo||{};
  var cfg='<div class="panel"><h3>Parâmetros da análise — '+turnoLabel()+' · '+fmtBR(DATA)+'</h3>'+
    '<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-size:13px">'+
    '<label>Horas do turno ('+(HORAS[TURNO]||HORAS.dia).ini+'–'+(HORAS[TURNO]||HORAS.dia).fim+'): <input type="number" min="1" step="0.5" value="'+horas+'" onchange="setCfg(\''+hk+'\',this.value)" class="metai" style="width:80px"></label>'+
    '<label>Duração média por atividade (h): <input type="number" min="0.1" step="0.5" value="'+dur+'" onchange="setCfg(\'dur\',this.value)" class="metai" style="width:80px"></label>'+
    '<span style="color:var(--muted);font-size:12px">Demanda (HH) = nº do recurso × duração. Capacidade (HH) = efetivo × horas/turno.</span></div></div>';
  var s=selT();
  var encs=DADOS.enc.filter(function(g){return g.tags.some(function(t){return s[t]&&Object.keys(s[t]).length;});});
  if(!encs.length)return cfg+'<div class="panel"><div class="empty">Nenhuma atividade programada neste turno. Marque atividades em "Montar Programação" para analisar o efetivo.</div></div>';
  var cards=encs.map(function(g){var nm=encNome(g);var ef=DB.efetivo[nm]=DB.efetivo[nm]||{};var d=demandaEnc(g);var falta=false;
    var rows=EFD.map(function(D){var dm=Math.round(d.dem[D[0]]||0);var av=ef[D[0]]||0;var cap=av*horas;
      if(!dm&&!av)return '';
      var ok=cap>=dm;if(dm>cap)falta=true;
      var sit=dm===0?'<span style="color:var(--muted)">sem demanda</span>':ok?'<span class="pill p-c">OK · folga '+(cap-dm)+' HH</span>':'<span class="pill p-r">faltam '+(dm-cap)+' HH</span>';
      return '<tr><td class="tg">'+D[1]+'</td><td><input type="number" min="0" value="'+av+'" onchange="setEfet(\''+nm.replace(/'/g,"\\'")+'\',\''+D[0]+'\',this.value)" class="metai" style="width:72px"></td><td class="cc">'+dm+' HH</td><td class="cc">'+cap+' HH</td><td>'+sit+'</td></tr>';}).join('');
    var totDem=Math.round(Object.keys(d.dem).reduce(function(a,k){return a+d.dem[k];},0));
    return '<div class="panel"><h3>👷 '+nm+' <span style="font-size:12.5px;color:var(--muted);font-weight:400">· '+d.nat+' atividades · '+totDem+' HH de demanda · '+(falta?'<span style="color:var(--rd);font-weight:700">⚠ EFETIVO INSUFICIENTE</span>':'<span style="color:var(--ok);font-weight:700">✓ EFETIVO SUPORTA</span>')+'</span></h3>'+
      '<table class="tbl"><thead><tr><th>Disciplina</th><th>Efetivo disponível</th><th>Demanda</th><th>Capacidade</th><th>Situação</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" class="empty">Sem recursos nas atividades selecionadas.</td></tr>')+'</tbody></table></div>';
  }).join('');
  return cfg+cards;
}
function renderResumo(){
  var s=selT();var PCTN={n:0,a:50,c:100};
  var encs=DADOS.enc.filter(function(g){return g.tags.some(function(t){return s[t]&&Object.keys(s[t]).length;});});
  var bar='<div class="noprint" style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn" onclick="window.print()">🖨 Imprimir resumo</button></div>';
  if(!encs.length)return '<div class="panel">'+bar+'<div class="empty">Nada programado para '+(TURNO==='dia'?'o Dia':'a Noite')+' de '+fmtBR(DATA)+'.</div></div>';
  var T=0,D=0,A=0,N=0;
  var blocks=encs.map(function(g){var nm=encNome(g);var et=0,ed=0,ea=0,en0=0,sump=0;var items='';
    g.tags.forEach(function(t){var sel=s[t];if(!sel)return;
      atDe(t).forEach(function(a){if(a.f!==undefined)return;var e=sel[a.i];if(!e)return;et++;var st=e.st;var p=(e.pct!=null?(parseFloat((''+e.pct).replace(',','.'))||0):PCTN[st]);sump+=p;
        if(st==='c')ed++;else if(st==='a')ea++;else en0++;
        items+='<tr><td>'+t+'</td><td>'+a.a+'</td><td class="cc">'+p+'%</td><td><span class="pill p-'+st+'">'+STLBL[st]+'</span></td></tr>';});
    });
    T+=et;D+=ed;A+=ea;N+=en0;
    var pc=et?Math.round(ed/et*100):0;var avg=et?Math.round(sump/et):0;
    return '<div class="panel"><h3>👷 '+nm+'</h3>'+
      '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;margin-bottom:8px">'+
      '<span><b>'+et+'</b> programadas</span>'+
      '<span style="color:var(--rd)">⚪ <b>'+en0+'</b> não iniciadas</span>'+
      '<span style="color:var(--am)">🟡 <b>'+ea+'</b> em andamento</span>'+
      '<span style="color:var(--ok)">🟢 <b>'+ed+'</b> concluídas</span>'+
      '<span>Avanço médio: <b>'+avg+'%</b></span></div>'+
      '<div class="prog"><div class="progf" style="width:'+pc+'%"></div></div>'+
      '<table class="tbl" style="margin-top:10px"><thead><tr><th>TAG</th><th>Atividade</th><th>%</th><th>Status</th></tr></thead><tbody>'+items+'</tbody></table></div>';
  }).join('');
  var gpc=T?Math.round(D/T*100):0;
  var head='<div class="panel" id="rhead"><div class="prhead"><img class="prlogo" src="'+(typeof LOGO!=='undefined'?LOGO:'')+'"><div><div class="prtitle">RESUMO DO TURNO '+(TURNO==='dia'?'DIURNO ☀':'NOTURNO 🌙')+'</div><div class="prsub">UGAV · PERMUTADORES · '+turnoLabel()+' · '+fmtBR(DATA)+histTag()+'</div></div></div>'+
    '<div class="kpis" style="margin-top:12px">'+kpi('bl',T,'Programadas')+kpi('rd',N,'Não iniciadas')+kpi('am',A,'Em andamento')+kpi('ok',D,'Concluídas')+kpi('ok',gpc+'%','% Executado')+'</div></div>';
  return bar+head+blocks;
}
function renderBanco(){
  var tag=window._bancoTag||DADOS.ordem[0];
  ensureWbs(tag);
  var opts=DADOS.ordem.map(function(t){return '<option value="'+t+'"'+(t===tag?' selected':'')+'>'+t+' — '+((DADOS.equip[t]||{}).desc||'')+'</option>';}).join('');
  var acts=atDe(tag);
  var list=acts.map(function(a){
    if(a.f!==undefined)return '<div class="wfase"><span class="wft">'+a.n+'. '+a.f+'</span><span class="wbtns">'+
      '<button onclick="bancoAddInPhase(\''+tag+'\',\''+a.i+'\')" class="addb" title="Adicionar atividade no fim desta fase">＋ atividade</button>'+
      '<button onclick="bancoMove(\''+tag+'\',\''+a.i+'\',-1)" title="Subir fase">↑</button><button onclick="bancoMove(\''+tag+'\',\''+a.i+'\',1)" title="Descer fase">↓</button>'+
      '<button onclick="bancoEdit(\''+tag+'\',\''+a.i+'\')" title="Renomear fase">✎</button><button onclick="bancoDel(\''+tag+'\',\''+a.i+'\')" class="del" title="Remover fase">✕</button></span></div>';
    return '<div class="wact"><div class="wn">'+a.n+'</div><div class="wd">'+a.a+(a.r?'<div class="rec">👷 '+a.r+'</div>':'')+'</div><span class="wbtns">'+
      '<button onclick="bancoMove(\''+tag+'\',\''+a.i+'\',-1)" title="Subir">↑</button><button onclick="bancoMove(\''+tag+'\',\''+a.i+'\',1)" title="Descer">↓</button>'+
      '<button onclick="bancoAddBelow(\''+tag+'\',\''+a.i+'\')" class="addb" title="Inserir atividade abaixo desta">＋ abaixo</button>'+
      '<button onclick="bancoEdit(\''+tag+'\',\''+a.i+'\')" title="Editar">✎</button><button onclick="bancoDel(\''+tag+'\',\''+a.i+'\')" class="del" title="Remover">✕</button></span></div>';
  }).join('');
  var edited=!!(DB.wbs&&DB.wbs[tag]);
  return '<div class="panel"><h3>Banco de Atividades — WBS editável</h3>'+
    '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px"><label>Equipamento: <select onchange="window._bancoTag=this.value;render()" class="metai" style="max-width:340px">'+opts+'</select></label>'+
    '<button class="btn" onclick="bancoAddPhase(\''+tag+'\')">+ Nova fase</button>'+
    '<button class="btn ghost" onclick="bancoReset(\''+tag+'\')">↺ Restaurar original</button></div>'+
    '<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">'+tag+' · '+((DADOS.equip[tag]||{}).tipo||'')+' · '+AREALBL(area(tag))+' · '+acts.filter(function(a){return a.f===undefined;}).length+' atividades. Insira/reposicione atividades dentro das fases (↑↓) — a numeração WBS se ajusta sozinha. As mudanças aparecem ao montar a programação.</div>'+list+'</div>';
}
function addBase(tag){var a=prompt('Descrição da nova atividade para '+tag+':');if(!a||!a.trim())return;var r=prompt('Recurso (ex.: 02 CALDEIREIRO):','')||'';DB.baseExtra=DB.baseExtra||{};DB.baseExtra[tag]=DB.baseExtra[tag]||[];var n=1;while(DB.baseExtra[tag].some(function(x){return x.i==='x'+n;}))n++;DB.baseExtra[tag].push({i:'x'+n,a:a.trim(),r:r.trim()});save();render();}
function remBase(tag,id){if(DB.baseExtra&&DB.baseExtra[tag]){DB.baseExtra[tag]=DB.baseExtra[tag].filter(function(x){return x.i!==id;});if(!DB.baseExtra[tag].length)delete DB.baseExtra[tag];save();render();}}
function setProgF(t,k,f,v){if(bloqueada())return;var st=selT()[t];var e=st&&st[k];if(e){e[f]=v;save();}}
function setProgPct(t,k,v){if(bloqueada())return;var st=selT()[t];var e=st&&st[k];if(e){var n=parseFloat((''+v).replace(',','.'));if(isNaN(n))n=0;if(n<0)n=0;if(n>100)n=100;e.pct=''+n;e.st=n>=100?'c':n>0?'a':'n';save();render();}}
function setProgEf(t,k,d,v){if(bloqueada())return;var st=selT()[t];var e=st&&st[k];if(e){e.ef=e.ef||{};e.ef[d]=(v===''?null:(parseInt(v)||0));save();}}
var USERS={taiza:'1234',artur:'4321',vanessa:'1001',c3plan:'101520'};

checkSess();
